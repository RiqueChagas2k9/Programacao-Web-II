<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pagamento</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5; 
        }
        .card { 
            width: 100%;
            max-width: 400px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            text-align: left;
        }
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box;
        }
        button { 
            background-color: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #resultado { 
            margin-top: 10px;
            padding: 15px;
            border-radius: 8px;
            background-color: #e9ecef;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Pagamento</h2>
        
        <form id="meuFormulario">
            <label for="preco">Preço à vista (R$):</label>
            <input type="number" id="preco" step="0.01" required placeholder="Digite o valor">

            <label for="parcelas">Forma de Pagamento:</label>
            <select id="parcelas">
                <option value="1">1x (À vista)</option>
                <option value="3">3x (10% de acréscimo)</option>
                <option value="5">5x (20% de acréscimo)</option>
            </select>

            <button type="submit">Calcular Agora</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script src="Calculadora de pagamento a vista e parcelas.js"></script>
</body>
</html>
