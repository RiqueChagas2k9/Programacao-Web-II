<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Áreas (cm)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .bloco { background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 10px; max-width: 350px; shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; }
        label { font-size: 0.9em; color: #666; }
        input { margin: 5px 0 15px 0; display: block; width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 5px; width: 100%; font-weight: bold; }
        button:hover { background-color: #218838; }
        .resultado { font-weight: bold; color: #d9534f; margin-top: 15px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h2>Calculadora de Áreas em Centímetros</h2>

    <div class="bloco">
        <h3>Círculo</h3>
        <label>Raio (cm):</label>
        <input type="number" id="raio" placeholder="Ex: 5">
        <button onclick="calcularCirculo()">Calcular Área</button>
        <p id="resCirculo" class="resultado"></p>
    </div>

    <div class="bloco">
        <h3>Quadrado</h3>
        <label>Lado (cm):</label>
        <input type="number" id="lado" placeholder="Ex: 10">
        <button onclick="calcularQuadrado()">Calcular Área</button>
        <p id="resQuadrado" class="resultado"></p>
    </div>

    <div class="bloco">
        <h3>Retângulo</h3>
        <label>Base (cm):</label>
        <input type="number" id="base" placeholder="Ex: 12">
        <label>Altura (cm):</label>
        <input type="number" id="altura" placeholder="Ex: 8">
        <button onclick="calcularRetangulo()">Calcular Área</button>
        <p id="resRetangulo" class="resultado"></p>
    </div>

    <script src="Calculadora area.js"></script>
</body>
</html>
